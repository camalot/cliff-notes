---
name: Publish Release
on: # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      force-next-version:
        description: 'Force the next version. Must be in the format vX.Y.Z. Tag must not exist.'
        required: false
        default: ''
      vsix-publish:
        description: 'Whether to publish the VSIX to the marketplaces.'
        required: false
        default: 'true'
permissions: {}
env:
  PACKAGE_OWNER: 'darthminos'
  PACKAGE_NAME: 'cliff-toml'
  ACT: ""
  VS_MARKETPLACE_TOKEN: ""
  OPEN_VSX_TOKEN: ""
  GIT_USER_NAME: 'github-actions[bot]'
  GIT_USER_EMAIL: '41898282+github-actions[bot]@users.noreply.github.com'
jobs:
  version:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      statuses: write
      issues: write
      pull-requests: write
    outputs:
      current_version: ${{ steps.get.outputs.current_version }}
      ver_major_minor_patch: ${{ steps.get.outputs.major_minor_patch }}
      ver_major_minor: ${{ steps.get.outputs.major_minor }}
      ver_major: ${{ steps.get.outputs.major }}
      tag: ${{ steps.get.outputs.tag_major_minor_patch }}
      tag_major: ${{ steps.get.outputs.tag_major }}
      tag_major_minor: ${{ steps.get.outputs.tag_major_minor }}
      tag_major_minor_patch: ${{ steps.get.outputs.tag_major_minor_patch }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Determine next version
        id: get
        uses: camalot/actions/version/get@v1
        with:
          default_version: v1.0.0
          fail_on_default: true
          enable_pr_comment: true
          token: ${{ github.token }}
        env:
          FORCE_NEXT_VERSION: ${{ github.event.inputs.force-next-version || '' }}
      - run: |
          echo "next version: ${TAG}"
        env:
          CURRENT_VERSION: ${{ steps.get.outputs.current_version }}
          TAG: ${{ steps.get.outputs.tag_major_minor_patch }}
          VERSION: ${{ steps.get.outputs.major_minor_patch }}
          TAG_MAJOR: ${{ steps.get.outputs.tag_major }}
          TAG_MAJOR_MINOR: ${{ steps.get.outputs.tag_major_minor }}
          TAG_MAJOR_MINOR_PATCH: ${{ steps.get.outputs.tag_major_minor_patch }}
          VER_MAJOR: ${{ steps.get.outputs.major }}
          VER_MAJOR_MINOR: ${{ steps.get.outputs.major_minor }}
          VER_MAJOR_MINOR_PATCH: ${{ steps.get.outputs.major_minor_patch }}

  verify:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      statuses: write
      issues: write
      pull-requests: write
    needs:
      - version
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: |
          {
            echo "## Verify Release Initialization"
            echo ""
            echo "**ACTOR**: \`$ACTOR\`"
            echo "**BRANCH**: \`$BRANCH\`"
            echo "**OWNER**: \`$REPO_OWNER\`"
            echo "**REPO_NAME**: \`$REPO_NAME\`"
            echo "**PACKAGE_OWNER**: \`$PACKAGE_OWNER\`"
            echo "**PACKAGE_NAME**: \`$PACKAGE_NAME\`"
            echo "**ACT**: \`$ACT\`"
            echo ""
            echo "---"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ ! -z "$ACT" ]; then
            {
              echo "❌ **ACT** is set to $ACT"
              echo "❌ Release Will **NOT** Proceed"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "✅ **ACT** Passes Check" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$REPO_NAME" != "vscode-workspace-tasks" ]; then
            {
              echo "❌ **REPO_NAME** is not vscode-workspace-tasks"
              echo "❌ Release Will **NOT** Proceed"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "✅ **REPO_NAME** Passes Check" >> "$GITHUB_STEP_SUMMARY"
          fi

          # release should only proceed if ACTOR is REPOSITORY Owner
          if [ "$ACTOR" != "$REPO_OWNER" ]; then
            {
              echo "❌ **ACTOR** is not the repository owner"
              echo "❌ Release Will **NOT** Proceed"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "✅ **ACTOR** Passes Check" >> "$GITHUB_STEP_SUMMARY"
          fi

          # release should only proceed if BRANCH is develop
          if [ "$BRANCH" != "refs/heads/develop" ]; then
              {
                echo "❌ **BRANCH** is not develop"
                echo "❌ Release Will **NOT** Proceed"
              } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "✅ **BRANCH** Passes Check" >> "$GITHUB_STEP_SUMMARY"
          fi

          # release should only proceed if PACKAGE_OWNER is darthminos
          if [ "$PACKAGE_OWNER" != "darthminos" ]; then
            {
              echo "❌ **PACKAGE_OWNER** is not darthminos"
              echo "❌ Release Will **NOT** Proceed"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "✅ **PACKAGE_OWNER** Passes Check" >> "$GITHUB_STEP_SUMMARY"
          fi

          # release should only proceed if PACKAGE_NAME is workspace-tasks
          if [ "$PACKAGE_NAME" != "workspace-tasks" ]; then
            {
              echo "❌ **PACKAGE_NAME** is not workspace-tasks"
              echo "❌ Release Will **NOT** Proceed"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "✅ **PACKAGE_NAME** Passes Check" >> "$GITHUB_STEP_SUMMARY"
          fi

          # verify against package.json
          PACKAGE_NAME_JSON=$(jq -r '.name' package.json)
          PACKAGE_PUBLISHER_JSON=$(jq -r '.publisher' package.json)
          PACKAGE_VERSION_JSON=$(jq -r '.version' package.json)
          if [ "$PACKAGE_NAME_JSON" != "$PACKAGE_NAME" ]; then
            {
              echo "❌ **PACKAGE_NAME** in package.json is not $PACKAGE_NAME"
              echo "❌ Release Will **NOT** Proceed"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "✅ **PACKAGE_NAME** in package.json Passes Check" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$PACKAGE_PUBLISHER_JSON" != "$PACKAGE_OWNER" ]; then
            {
              echo "❌ **PACKAGE_PUBLISHER** in package.json is not $PACKAGE_OWNER"
              echo "❌ Release Will **NOT** Proceed"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "✅ **PACKAGE_PUBLISHER** in package.json Passes Check" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$PACKAGE_VERSION_JSON" != "$EXPECTED_VERSION" ]; then
            {
              echo "❌ **PACKAGE_VERSION** in package.json is not \`$EXPECTED_VERSION\`"
              echo "❌ Release Will **NOT** Proceed"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "✅ **PACKAGE_VERSION** in package.json Passes Check" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$FORCE_NEXT_VERSION" ]; then
            {
              echo "ℹ️ **FORCE_NEXT_VERSION** is set to $FORCE_NEXT_VERSION"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "✅ All Initial Checks Passed" >> "$GITHUB_STEP_SUMMARY"
          exit 0

    env:
      ACTOR: ${{ github.actor }}
      BRANCH: ${{ github.ref }}
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      EXPECTED_VERSION: ${{ needs.version.outputs.current_version }}

  lint:
    runs-on: ubuntu-latest
    environment: production
    needs:
      - verify
    permissions:
      contents: read
      statuses: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: ./.github/actions/lint
        with:
          github-token: ${{ github.token }}

  test:
    runs-on: ubuntu-latest
    environment: production
    needs:
      - verify
    permissions:
      contents: read
      statuses: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: ./.github/actions/test
        with:
          github-token: ${{ github.token }}
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  vsix-package:
    runs-on: ubuntu-latest
    needs:
      - version
      - verify
      - test
      - lint
    permissions:
      deployments: write
      contents: read
    outputs:
      artifact-id: ${{ steps.package-vsix.outputs.artifact-id }}
      artifact-url: ${{ steps.package-vsix.outputs.artifact-url }}
      artifact-digest: ${{ steps.package-vsix.outputs.artifact-digest }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "Package VSIX"
        uses: ./.github/actions/vsix/package
        id: package-vsix
        with:
          github-token: ${{ github.token }}
          version: ${{ env.VERSION }}
          package-owner: ${{ env.PACKAGE_OWNER }}
          package-name: ${{ env.PACKAGE_NAME }}

      - name: "VSIX Package Information"
        shell: bash
        run: |
          {
            echo "## Artifact Information"
            echo ""
            echo "| Artifact ID | Artifact URL | Artifact Digest |"
            echo "|-------------|-------------|----------------|"
            echo "| $ARTIFACT_ID | $ARTIFACT_URL | $ARTIFACT_DIGEST |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          ARTIFACT_ID: ${{ steps.package-vsix.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.package-vsix.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.package-vsix.outputs.artifact-digest }}

  vsix-publish:
    runs-on: ubuntu-latest
    needs: vsix-package
    permissions:
      deployments: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "Publish VSIX"
        uses: ./.github/actions/vsix/publish
        with:
          github-token: ${{ github.token }}
          artifact-name: ${{ needs.vsix-package.outputs.artifact-name }}
          artifact-pattern: '*.vsix'
          dry-run: ${{ env.ACT != '' || env.DRY_RUN == 'true' }}
          vsix-publish: ${{ github.event.inputs.vsix-publish }}
          vs-marketplace-token: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          openvsx-token: ${{ secrets.OPEN_VSX_TOKEN }}
          version: ${{ steps.get.outputs.major_minor_patch }}
          package-owner: ${{ env.PACKAGE_OWNER }}
          package-name: ${{ env.PACKAGE_NAME }}

  docker-publish:
    if: ${{ github.event.inputs.docker-publish == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - vsix-package
      - version
    permissions:
      deployments: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "Lookup git-cliff Version for Build Args"
        id: git-cliff
        run: |
          GIT_CLIFF_TAG=$(curl -s "https://api.github.com/repos/orhun/git-cliff/releases/latest" | jq -r ".tag_name")
          GIT_CLIFF_VERSION=${GIT_CLIFF_TAG#v}
          GIT_CLIFF_VERSION_SIG_URL="https://github.com/orhun/git-cliff/releases/download/$GIT_CLIFF_TAG/git-cliff-$GIT_CLIFF_VERSION-aarch64-unknown-linux-gnu.tar.gz.sha512"
          # Verify the URL is valid
          if curl --head --silent --fail "$GIT_CLIFF_VERSION_SIG_URL" >/dev/null; then
            echo "GIT_CLIFF_VERSION=$GIT_CLIFF_VERSION" >> "$GITHUB_ENV"
            echo "version=$GIT_CLIFF_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "Failed to fetch git-cliff version from GitHub API or the signature URL is not valid." >&2
            exit 1
          fi

      - name: "Publish Docker Image"
        uses: ./.github/actions/docker/publish
        with:
          github-token: ${{ github.token }}

        env:
          # Environment Variables
          #   Support for multiple registries to push via Environment Variables
          #   IDENTIFIER is a unique identifier for the variable group
          #   - DBPA_USERNAME_IDENTIFIER=myuser
          #   - DBPA_PASSWORD_IDENTIFIER=mypassword
          #   - DBPA_REGISTRY_IDENTIFIER=myregistry.io
          #
          #   Build Args via Environment Variables
          #   IDENTIFIER is the key of the build argument
          #   - BUILD_ARGS_IDENTIFIER=mybuildarg
          #   - BUILD_ARGS_ANOTHER_IDENTIFIER=myotherbuildarg
          #
          #   Labels via Environment Variables
          #   IDENTIFIER is the key of the label
          #   - LABELS_IDENTIFIER=mylabel

          DBPA_USERNAME_GHCR: ${{ github.actor }}
          DBPA_PASSWORD_GHCR: ${{ secrets.GITHUB_TOKEN }}
          DBPA_REGISTRY_GHCR: ghcr.io

          BUILD_ARGS_VERSION: ${{ steps.get.outputs.major_minor_patch }}
          BUILD_ARGS_NODE_VERSION: '25'
          BUILD_ARGS_GIT_CLIFF_VERSION: ${{ steps.git-cliff.outputs.version }}
