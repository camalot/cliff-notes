---
name: Package and Publish VSIX
description: Package the VSIX and optionally publish to the marketplaces
inputs:
  github-token:
    description: 'GitHub Token'
    required: false
    default: ${{ github.token }}
  version:
    description: 'Version to publish (e.g., 1.0.0).'
    required: true
  vsix_publish:
    description: 'Whether to publish the VSIX to the marketplaces.'
    required: false
    default: 'true'
  vsmarket_token:
    description: 'Visual Studio Marketplace Token'
    required: false
    default: ''
  openvsx_token:
    description: 'Open VSX Token'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Prepare Environment
      shell: bash
      run: |
        echo "::group::Preparing environment for VSIX packaging and publishing..."
        if [[ -z "${IVERSION}" ]]; then
          echo "Error: Version input is required." 2>&1
          exit 1
        fi
        if [[ "${IVSIX_PUBLISH,,}" != "true" ]]; then
          echo "VERSION=false" >> $GITHUB_ENV
        else
          echo "VERSION=true" >> $GITHUB_ENV
        fi
        echo "::endgroup::"
      env:
        IVERSION: ${{ inputs.version }}
        IVSIX_PUBLISH: ${{ inputs.vsix_publish }}

    - name: Prepare vscode-extension/package.json file
      # we do not commit here. The release call does a commit.
      # if it fails, then we don't commit this change
      run: |
        echo "::group::Prepare package.json"
        yq eval --inplace ".version = \"${VERSION}\"" vscode-extension/package.json
        git add vscode-extension/package.json
        echo "::endgroup::"
      shell: bash
      env:
        VERSION: ${{ inputs.version }}

    - name: Configure git
      shell: bash
      run: |
        echo "::group::Configure git user"
        git config user.name  "${GIT_USER_NAME}"
        git config user.email "${GIT_USER_EMAIL}"
        gh auth setup-git
        echo "::endgroup::"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '25.x'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Build
      shell: bash
      run: |
        echo "::group::Build"
        pnpm run compile
        echo "::endgroup::"

    - name: Prepare package.json file
      shell: bash
      # we do not commit here. The release call does a commit.
      # if it fails, then we don't commit this change
      run: |
        echo "::group::Prepare package.json"
        yq eval --inplace ".version = \"${VERSION}\"" package.json
        git add package.json
        echo "::endgroup::"
      env:
        VERSION: ${{ needs.version.outputs.ver_major_minor_patch }}

    - name: Package VSIX
      shell: bash
      run: |
        echo "::group::Packaging VSIX"
        mkdir -p dist
        pnpm exec vsce package --no-dependencies --out "dist/${PACKAGE_OWNER}-${PACKAGE_NAME}-${VERSION}.vsix"
        echo "::endgroup::"
      env:
        VERSION: ${{ needs.version.outputs.ver_major_minor_patch }}

    - name: Capture pre-release state
      shell: bash
      id: rollback_state
      # Record HEAD and the floating tags' prior targets BEFORE the release
      # moves them, so the rollback step can restore them if a later step
      # (publish/upload) fails after a successful release.
      run: |
        set -euo pipefail
        echo "::group::Capture pre-release state (for rollback)"
        {
          echo "head_sha=$(git rev-parse HEAD)"
          echo "tag_major_sha=$(git ls-remote origin "refs/tags/${TAG_MAJOR}" | awk 'NR==1{print $1}')"
          echo "tag_major_minor_sha=$(git ls-remote origin "refs/tags/${TAG_MAJOR_MINOR}" | awk 'NR==1{print $1}')"
        } >> "${GITHUB_OUTPUT}"
        echo "::endgroup::"
      env:
        TAG_MAJOR: ${{ needs.version.outputs.tag_major }}
        TAG_MAJOR_MINOR: ${{ needs.version.outputs.tag_major_minor }}

