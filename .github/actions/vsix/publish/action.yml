---
name: Publish VSIX
description: Publish the VSIX package to the marketplaces.
inputs:
  token:
    description: "GitHub token for authentication"
    required: false
    default: ${{ github.token }}
  artifact-name:
    description: "Name of the artifact to download. If unspecified, all artifacts for the run are downloaded."
    required: false
    default: ''
  artifact-pattern:
    description: A glob pattern to the artifacts that should be downloaded. Ignored if name is specified.
    required: false
    default: ''
  path:
    description: Destination path. Supports basic tilde expansion.
    required: false
    default: ${{ github.workspace }}
  vsix-publish:
    description: "Whether to publish the VSIX package. Set to 'true' to publish."
    required: false
    default: 'true'
  openvsx-token:
    description: "Token for publishing to Open VSX Registry"
    required: false
    default: ''
  vs-marketplace-token:
    description: "Token for publishing to Visual Studio Marketplace"
    required: false
    default: ''
  dry-run:
    description: "If set to 'true', the action will go through all steps except the actual publish step. Useful for testing."
    required: false
    default: 'true'
  version:
    description: 'Version to publish (e.g., 1.0.0).'
    required: true
  package-owner:
    description: 'Owner of the package.'
    required: true
  package-name:
    description: 'Name of the package.'
    required: true
runs:
  using: composite
  steps:
    # get the uploaded VSIX
    - name: Download VSIX Artifact
      if: ${{ env.ACT == '' }}
      uses: actions/download-artifact@v8
      id: download_artifact
      with:
        name: ${{ inputs.artifact-name }}
        pattern: ${{ inputs.artifact-pattern }}
        path: ${{ inputs.path }}

    - name: Download VSIX Artifact (act)
      if: ${{ env.ACT != '' }}
      uses: actions/download-artifact@v4
      id: download_artifact_act
      with:
        name: ${{ inputs.artifact-name }}
        pattern: ${{ inputs.artifact-pattern }}
        path: ${{ inputs.path }}

    - name: Set Environment Variables
      shell: bash
      run: |
        {
          echo "VERSION=${VERSION,,}"
          echo "PACKAGE_OWNER=${PACKAGE_OWNER,,}"
          echo "PACKAGE_NAME=${PACKAGE_NAME,,}"
          echo "ASSET_PATH=${ASSET_PATH}"
          if [[ "${VSIX_PUBLISHZ,,}" != "true" ]]; then
            echo "VSIX_PUBLISH=false"
          else
            echo "VSIX_PUBLISH=true"
          fi
        } >> "$GITHUB_ENV"
      env:
        VERSION: ${{ inputs.version }}
        PACKAGE_OWNER: ${{ inputs.package-owner }}
        PACKAGE_NAME: ${{ inputs.package-name }}
        ASSET_PATH: ${{ steps.download_artifact.outputs.download-path || steps.download_artifact_act.outputs.download-path }}
        VSIX_PUBLISHZ: ${{ inputs.vsix-publish }}

    - name: Verify VSIX file exists
      shell: bash
      run: |
        VSIX=$(find "${ASSET_PATH}" -name "*.vsix" -type f | head -1)
        echo "::group::VSIX: $VSIX"
        if [ -z "$VSIX" ] || [ ! -f "$VSIX" ]; then
          echo -e "\e[31mVSIX not found under: ${ASSET_PATH}\e[0m" >&2
          echo "Contents of ${ASSET_PATH}:"
          ls -la "${ASSET_PATH}"
          exit 1
        fi
        echo "VSIX_FILE=${VSIX}" >> "$GITHUB_ENV"
        echo -e "\e[32mVSIX found: $VSIX ($(du -h "$VSIX" | cut -f1))\e[0m"
        echo "::endgroup::"

    - name: Publish to Open VSX Registry
      # only publish if everything before (incl. Create Release) succeeded
      if: ${{ success() && env.OPEN_VSX_TOKEN != '' && env.VSIX_PUBLISH == 'true' }}
      uses: HaaLeo/publish-vscode-extension@v2
      with:
        pat: ${{ env.OPEN_VSX_TOKEN }}
        registryUrl: https://open-vsx.org
        skipDuplicate: true
        extensionFile: ${{ env.VSIX_FILE }}
        dryRun: ${{ inputs.dry-run }}

      env:
        OPEN_VSX_TOKEN: ${{ inputs.openvsx-token }}

    - name: Publish to Visual Studio Marketplace
      # only publish if everything before (incl. Create Release) succeeded
      if: ${{ success() && env.VS_MARKETPLACE_TOKEN != '' && env.VSIX_PUBLISH == 'true' }}
      uses: HaaLeo/publish-vscode-extension@v2
      with:
        pat: ${{ env.VS_MARKETPLACE_TOKEN }}
        registryUrl: https://marketplace.visualstudio.com
        skipDuplicate: true
        extensionFile: ${{ env.VSIX_FILE }}
        dryRun: ${{ inputs.dry-run }}
      env:
        VS_MARKETPLACE_TOKEN: ${{ inputs.vs-marketplace-token }}
