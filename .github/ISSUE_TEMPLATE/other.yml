name: "💬 Other"
description: "General issue or question that doesn't fit the other categories"
labels: ["triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Use this template for issues that don't fit the other categories. If you have questions, please consider using [Discussions](https://github.com/cliff-notes/cliff-notes/discussions) instead.

  - type: input
    id: title
    attributes:
      label: "Title"
      description: "Brief description of the issue"
      placeholder: "What's on your mind?"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Provide as much detail as possible"
      placeholder: "Tell us more about your issue..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Any additional information that might be helpful"
      placeholder: "Screenshots, logs, or anything else relevant..."

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      options:
        - label: "I have searched existing issues"
          required: true
        - label: "This issue is not better suited for Discussions"
