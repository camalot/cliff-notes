name: "🐛 Bug Report"
description: "Report a bug or unexpected behavior"
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in as much information as possible to help us investigate.

  - type: dropdown
    id: component
    attributes:
      label: "Component"
      description: "Which component of cliff-notes is affected?"
      options:
        - "Web UX"
        - "API"
        - "Cliff Tera Language"
        - "Shared"
        - "E2E Tests"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: "Summary"
      description: "Brief description of the bug"
      placeholder: "e.g., Config editor crashes when pasting large TOML files"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Detailed description of the bug and any relevant context"
      placeholder: "Describe the bug here..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: "How can we reproduce this bug?"
      placeholder: |
        1. Click on "..."
        2. Enter "..."
        3. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What should happen instead?"
      placeholder: "The config should parse correctly..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What actually happened?"
      placeholder: "The app crashed with an error..."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Your environment details"
      placeholder: |
        - OS: macOS 14.0
        - Browser: Chrome 119
        - Node version: 20.10.0
        - cliff-notes version: 0.1.0

  - type: textarea
    id: logs
    attributes:
      label: "Error Logs or Screenshots"
      description: "Include error messages, console logs, or screenshots"
      placeholder: "Paste error logs or attach screenshots..."

  - type: textarea
    id: additional
    attributes:
      label: "Additional Context"
      description: "Any other relevant information"
      placeholder: "Add any other context here..."

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      options:
        - label: "I have searched existing issues"
          required: true
        - label: "This is a bug report, not a feature request"
          required: true
