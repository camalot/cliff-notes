# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[remote.github]
owner = "foo"
repo = "bar"

[changelog]
footer = """
<!-- https://cliff-notes.dev#template=cliff-notes-remote.toml -->
"""
# A Tera template to be rendered for each release in the changelog.
# See https://keats.github.io/tera/docs/#introduction
body = """
{# HEADERS #}
{%- set HEADER_NEW_CONTRIBUTORS = "❤️ New Contributors" -%}
{%- set HEADER_CONTRIBUTORS = "💛 Contributors" -%}
{%- set HEADER_STATISTICS = "📈 Commit Statistics"-%}
{# HEADERS END #}

{# MACROS #}
{%- macro unquote(input) -%}
  {{ input | trim_start_matches(pat='"') | trim_end_matches(pat='"') | trim_start_matches(pat="'") | trim_end_matches(pat="'")}}
{%- endmacro -%}

{%- macro remote_url() -%}
  {% if remote.github.owner and remote.github.repo -%}
    {%- raw -%}<REMOTE_URL>/{%- endraw -%}{{- remote.github.owner }}/{{ remote.github.repo -}}
  {% elif remote.azure_devops.owner and remote.azure_devops.repo -%}
    {%- raw -%}<REMOTE_URL>/{%- endraw -%}{{- remote.azure_devops.owner }}/{{ remote.azure_devops.repo -}}
  {% elif remote.bitbucket.owner and remote.bitbucket.repo -%}
    {%- raw -%}<REMOTE_URL>/{%- endraw -%}{{- remote.bitbucket.owner }}/{{ remote.bitbucket.repo -}}
  {% elif remote.gitlab.owner and remote.gitlab.repo -%}
    {%- raw -%}<REMOTE_URL>/{%- endraw -%}{{- remote.gitlab.owner }}/{{ remote.gitlab.repo -}}
  {% elif remote.gitea.owner and remote.gitea.repo -%}
    {%- raw -%}<REMOTE_URL>/{%- endraw -%}{{- remote.gitea.owner }}/{{ remote.gitea.repo -}}
  {%- else -%}
    {%- raw -%}<REPO>{%- endraw -%}
  {%- endif -%}
{%- endmacro -%}

{%- macro callout(message) -%}
  {% if remote.github.owner and remote.github.repo -%}
    {{ "\n\n    > [!CAUTION]\n    > " ~ message }}
  {% else %}
    {{ "  > " ~ message }}
  {% endif %}
{%- endmacro -%}

{%- macro user_url(name) -%}
  [@{{name}}](<REMOTE_URL>/{{name | lower }})
{%- endmacro -%}

{%- macro get_remote_header() -%}
  {% if remote.github.owner and remote.github.repo %}
    ## GitHub
  {% elif remote.bitbucket.owner and remote.bitbucket.repo %}
    ## BitBucket
  {% elif remote.gitlab.owner and remote.gitlab.repo %}
    ## GitLab
  {% elif remote.azure_devops.owner and remote.azure_devops.repo %}
    ## Azure DevOps
  {% elif remote.gitea.owner and remote.gitea.repo %}
    ## Gitea
  {% endif %}
{%- endmacro -%}

{%- macro full_changelog_url() -%}
  {% if remote.github.owner and remote.github.repo %}
    \n\n---\n\n
    \n**Full Changelog**: {{ self::remote_url() }}/compare/{{ previous.version }}...{{version}}
  {% elif remote.bitbucket.owner and remote.bitbucket.repo %}
    {%- raw -%}{%- endraw -%}
  {% elif remote.gitlab.owner and remote.gitlab.repo %}
    {%- raw -%}{%- endraw -%}
  {% elif remote.azure_devops.owner and remote.azure_devops.repo %}
    {%- raw -%}{%- endraw -%}
  {% elif remote.gitea.owner and remote.gitea.repo %}
    {%- raw -%}{%- endraw -%}
  {% endif %}
{%- endmacro -%}

{%- macro print_remote(new_contrib_header, contrib_header) -%}
  {{ self::get_remote_header() }}
  {% if remote.github.repo and remote.github.owner %}{%- set r = github -%}{%- endif -%}
  {% if remote.bitbucket.repo and remote.bitbucket.owner %}{%- set r = bitbucket -%}{%- endif -%}
  {% if remote.gitea.repo and remote.gitea.owner %}{%- set r = gitea -%}{%- endif -%}
  {% if remote.azure_devops.repo and remote.azure_devops.owner %}{%- set r = azure_devops -%}{%- endif -%}
  {% if remote.gitlab.repo and remote.gitlab.owner %}{%- set r = gitlab -%}{%- endif -%}
  {%- if r -%}
    {%- set new_contributors = r.contributors | filter(attribute="is_first_time", value=true) -%}
    {%- set contributors = r.contributors | filter(attribute="is_first_time", value=false) -%}
    {%- if new_contributors | length > 0 %}
      ### {{ new_contrib_header }}
      {{ self::print_contributors(contributors=new_contributors) }}\n\n
    {%- endif %}
    {%- if contributors | length > 0 %}
      ### {{ contrib_header }}\n
      {{ self::print_contributors(contributors=contributors) }}\n\n
    {%- endif %}

    {%- if version %}
      {{ self::full_changelog_url() }}
    {%- endif %}
  {%- endif %}
{%- endmacro -%}

{%- macro print_contributors(contributors) -%}
  {%- for contrib in contributors %}
    \n- {{ self::user_url(name=contrib.username) }}
    {%- if contrib.pr_number %} in \
      [!#!{{ contrib.pr_number }}]({{ self::remote_url() }}/pull/{{ contrib.pr_number }})
    {%- endif -%}
  {%- endfor -%}
{%- endmacro -%}

{%- macro clean_version(version, unreleased="unreleased") -%}
  {%- if version -%}
    {{ version | trim_start_matches(pat="v") }}
  {%- else -%}
    {{ HEADER_UNRELEASED | upper }}
  {%- endif -%}
{%- endmacro -%}

{%- macro plural(count, singular, plural) -%}
  {%- if count == 1 or count == -1 -%}
    {{ singular }}
  {%- else -%}
    {{ plural }}
  {%- endif -%}
{%- endmacro -%}

{%- macro print_statistics(statistics, header) -%}
  ### {{ header }}
  {%- set s_commit_count = statistics.commit_count -%}
  {%- set s_timespan = statistics.commits_timespan | default(value=0) -%}
  {%- set s_conv_count = statistics.conventional_commit_count -%}
  {%- set s_links_count = statistics.links | length -%}
  {%- set s_links = statistics.links -%}
  {%- set s_days_since = statistics.days_passed_since_last_release | default(value=0) -%}
  \n\n{{ "  " }}
  - `{{ s_commit_count }}` {{ self::plural(count=s_commit_count, singular="commit", plural="commits") }} contributed to the release.
  - `{{ s_timespan }}` {{ self::plural(count=s_timespan, singular="day", plural="days")}} {{ self::plural(count=s_timespan, singular="has", plural="have")}} passed between the first and last commit.
  - `{{ s_conv_count }}` {{ self::plural(count=s_commit_count, singular="commit", plural="commits") }} parsed as conventional.
  - `{{ s_links_count }}` linked {{ self::plural(count=s_links_count, singular="issue", plural="issues") }} detected in commits.

  {%- if s_links_count > 0 %}
	  {%- for link in statistics.links %}
      {{ "  " }}- [{{ link.text }}]({{ link.href }}) (referenced {{ link.count }} {{ self::plural(count=link.count, singular="time", plural="times") }})
	  {%- endfor %}
  {%- endif %}
  {%- if s_days_since > 0 %}
    - `{{ s_days_since }}` {{ self::plural(count=s_days_since, singular="day", plural="days") }}  {{ self::plural(count=s_days_since, singular="has", plural="have")}} passed between releases.
  {%- endif %}\n\n
{%- endmacro -%}

{%- macro alert(message, type="note") -%}
  {%- if remote.github.repo and remote.github.owner %}
    {{ "\n>[!" }}{{ type | upper }}{{ "]\n>" }}{{ message }}
  {%- else %}
    {{ "\n> **" }}{{ type | upper }}{{ "**:\n  > " }}{{ message }}
  {% endif -%}
{%- endmacro -%}

{# MACROS END #}

{# VERSION HEADER #}
{%- set c_version = self::clean_version(version=version, unreleased="unreleased") -%}
  {%- if github %}
    ## [v{{ c_version }}]({{ self::remote_url()}}/releases/tag/v{{ c_version }})
  {%- else %}
    ## v{{ c_version }}
  {%- endif %} \

  - {{ timestamp | date(format="%Y-%m-%d") }}
{# VERSION HEADER END #}

{# LOOP GROUPS #}
{%- for group, commits in commits | group_by(attribute="group") %}
    \n### {{ group | striptags | trim | upper_first }}
    {# LOOP COMMITS #}
    {%- for commit in commits %}
      - {% if commit.scope %}*({{ commit.scope }})* {% endif -%}
        {{ self::unquote(input=commit.message) | upper_first | trim }}
        {%- if commit.links -%} {% for link in commit.links %}[{{ link.text }}]({{ link.href }}) {% endfor -%}{%- endif -%}
        {%- if commit.author %} - [{{ self::user_url(name=commit.author.name) }}]{% endif -%}
        {%- if commit.breaking_description -%}{{ self::alert(message=commit.breaking_description, type="caution") }}{%- endif -%}
    {%- endfor -%}\n\n
{%- endfor %}
{# LOOP GROUPS END #}

{# STATISTICS #}
{{ self::print_statistics(statistics=statistics, header=HEADER_STATISTICS)}}
{# STATISTICS END #}

{# REMOTE INFO #}
{{ self::print_remote(new_contrib_header=HEADER_NEW_CONTRIBUTORS, contrib_header=HEADER_CONTRIBUTORS) }}
{# REMOTE INFO END #}
"""

# Remove leading and trailing whitespaces from the changelog's body.
trim = true
# Render body even when there are no releases to process.
render_always = true
# An array of regex based postprocessors to modify the changelog.
postprocessors = [
  { pattern = '<REMOTE_URL>', replace = "https://gitea.com" },
  # Replace the placeholder <REPO> with a URL.
  { pattern = '<REPO>', replace = "https://gitea.com/orhun/git-cliff" },
  { pattern = '#\d+', replace = ''},
  # we take the reformatted issue link and display it correctly
  { pattern = '!#!(\d+)', replace = '#$1'},
  { pattern = 'RFC\(?\d+\)?', replace = ''}

]
# render body even when there are no releases to process
# render_always = true
# output file path
# output = "test.md"

[git]
processing_order = [
  "commit_preprocessors",
  "split_commits",
  "conventional_commits",
  "commit_parsers",
  "link_parsers",
]
# Parse commits according to the conventional commits specification.
# See https://www.conventionalcommits.org
conventional_commits = true
# Exclude commits that do not match the conventional commits specification.
filter_unconventional = true
# Require all commits to be conventional.
# Takes precedence over filter_unconventional.
require_conventional = false
# Split commits on newlines, treating each line as an individual commit.
split_commits = true
# An array of regex based parsers to modify commit messages prior to further processing.
commit_preprocessors = [
  { pattern = '(?m)^\s*[\*-]\s*', replace = "" },
  { pattern = '(?m)^-{3,}\s*$', replace = "" },

  # Replace issue numbers with link templates to be updated in `changelog.postprocessors`.
  #{ pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](<REPO>/issues/${2}))"},
  # Check spelling of the commit message using https://github.com/crate-ci/typos.
  # If the spelling is incorrect, it will be fixed automatically.
  #{ pattern = '.*', replace_command = 'typos --write-changes -' },
]
# Prevent commits that are breaking from being excluded by commit parsers.
protect_breaking_commits = false
# An array of regex based parsers for extracting data from the commit message.
# Assigns commits to groups.
# Optionally sets the commit's scope and can decide to exclude commits from further processing.
commit_parsers = [
  { message = "(?i)^.*!:", group = "<!-- -1 -->💥 Breaking Change" },
  { message = "(?i)^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "(?i)^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "(?i)^docs?", group = "<!-- 3 -->📚 Documentation" },
  { message = "(?i)^perf", group = "<!-- 4 -->⚡ Performance" },
  { message = "(?i)^refactor", group = "<!-- 2 -->🚜 Refactor" },
  { message = "(?i)^style", group = "<!-- 5 -->🎨 Styling" },
  { message = "(?i)^tests?", group = "<!-- 6 -->🧪 Testing" },
  { message = "(?i)^chore\\(release\\): prepare for", skip = true },
  { message = "(?i)^(chore|build)\\(deps.*\\)", skip = true },
  { message = "(?i)^chore\\(pr\\)", skip = true },
  { message = "(?i)^chore\\(pull\\)", skip = true },
  { message = "(?i)^chore|^ci", group = "<!-- 7 -->⚙️ Miscellaneous Tasks" },
  { message = "(?i)^.*revert", group = "<!-- 9 -->◀️ Revert" },
  { body = "(?i).*security", group = "<!-- 8 -->🛡️ Security" },
  { message = "(?i)^co-authored-by:", skip = true },
  { message = ".*", group = "<!-- 10 -->💼 Other" },
]
# Exclude commits that are not matched by any commit parser.
filter_commits = false
# Fail on a commit that is not matched by any commit parser.
fail_on_unmatched_commit = false
# An array of link parsers for extracting external references, and turning them into URLs, using regex.
link_parsers = [
  { pattern = '#(\d+)', text = '!#!$1', href = "<REPO>/issues/$1"},
  { pattern = 'RFC\(?(\d+)\)?', text = "ietf-rfc$1", href = "https://datatracker.ietf.org/doc/html/rfc$1"},
]
# Include only the tags that belong to the current branch.
use_branch_tags = false
# Order releases topologically instead of chronologically.
topo_order = false
# Order commits topologically instead of chronologically.
topo_order_commits = true
# Order of commits in each group/release within the changelog.
# Allowed values: newest, oldest
sort_commits = "oldest"
# Process submodules commits
recurse_submodules = false
